name: Build and test

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  windows:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022]
        arch: [x86, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: matrix.arch == 'x64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        if: matrix.arch == 'x64'
        run: pip install pytest

      - name: Configure CMake (with Python bindings)
        if: matrix.arch == 'x64'
        run: >
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DBUILD_PYTHON_BINDINGS=ON

      - name: Configure CMake (C++ only)
        if: matrix.arch != 'x64'
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C RELEASE -V

  mac:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Configure CMake
        run: >
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DBUILD_PYTHON_BINDINGS=ON

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C RELEASE -V

  linux:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
        arch: [x86_64, aarch64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install QEMU for aarch64 emulation
        uses: docker/setup-qemu-action@v2
        with:
          platforms: all

      - name: Upgrade gcc
        run: sudo apt-get install -y gcc g++

      - name: Set up Python
        if: matrix.arch == 'x86_64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        if: matrix.arch == 'x86_64'
        run: pip install pytest

      - name: Configure CMake (with Python bindings)
        if: matrix.arch == 'x86_64'
        run: >
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
          -DBUILD_PYTHON_BINDINGS=ON

      - name: Configure CMake (C++ only)
        if: matrix.arch != 'x86_64'
        run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

      - name: Test
        working-directory: ${{github.workspace}}/build
        run: ctest -C RELEASE -V
